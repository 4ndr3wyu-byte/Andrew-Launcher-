<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-touch-fullscreen" content="yes">
    
    <title>Andrew Launcher</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow-y: auto;
            padding: 40px 20px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            max-width: 380px;
        }
        .menu-item {
            font-size: 17px;
            font-weight: 500;
            text-align: center;
            padding: 13px 0;
            color: #ffffff;
            transition: all 0.2s;
            cursor: pointer;
        }
        .menu-item:active {
            color: #888888;
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="menu">
        <div class="menu-item" onclick="openLink('calshow://')">달력</div>
        <div class="menu-item" onclick="openLink('tel:')">폰</div>
        <div class="menu-item" onclick="openLink('sms:')">메세지</div>
        <div class="menu-item" onclick="openLink('telegram://')">텔레그램</div>
        <div class="menu-item" onclick="openLink('tesla://')">테슬라</div>
        <div class="menu-item" onclick="openLink('shortcuts://run-shortcut?name=퇴근')">퇴근</div>
        <div class="menu-item" onclick="openLink('notes://')">노트</div>
        <div class="menu-item" onclick="openLink('https://smartlife.tuya.com')">SmartLife</div>
        <div class="menu-item" onclick="openLink('mcdonalds://')">MyMaccas</div>
        <div class="menu-item" onclick="openLink('https://www.hungryjacks.com.au')">Hungry Jack's</div>
        <div class="menu-item" onclick="openLink('https://ukg.com')">UKG Pro</div>
        <div class="menu-item" onclick="openLink('#')">MyISS</div>
        <div class="menu-item" onclick="openLink('https://www.apple.com')">Safari</div>
        <div class="menu-item" onclick="openLink('shortcuts://')">단축어</div>
        <div class="menu-item" onclick="openLink('App-Prefs:root')">세팅</div>
        <div class="menu-item" onclick="openLink('https://www.aliexpress.com')">알리익스프레스</div>
        <div class="menu-item" onclick="openLink('files://')">Files</div>
        <div class="menu-item" onclick="openLink('photos://')">포토</div>
        <div class="menu-item" onclick="openLink('webtoons://')">웹툰</div>
        <div class="menu-item" onclick="openLink('https://www.millie.co.kr')">밀리의 서재</div>
        <div class="menu-item" onclick="openLink('podcasts://')">팟캐스트</div>
        <div class="menu-item" onclick="openLink('#')">줄자</div>
        <div class="menu-item" onclick="openLink('https://x.com')">X</div>
        <div class="menu-item" onclick="openLink('https://scriptable.app')">Scriptable</div>
        <div class="menu-item" onclick="openLink('github://')">GitHub</div>
        <div class="menu-item" onclick="openLink('calculator://')">계산기</div>
        <div class="menu-item" onclick="openLink('#')">Warframe</div>
    </div>

    <script>
        function openLink(url) {
            window.location.href = url;
        }
    </script>
</body>
</html>

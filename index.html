<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-touch-fullscreen" content="yes">
    
    <title>Andrew Launcher</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow-y: auto;           /* 세로 스크롤 활성화 */
            padding: 40px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .menu {
            display: flex;
            flex-direction: column;
            gap: 18px;                  /* 줄 간격 50% 줄임 */
            width: 100%;
            max-width: 380px;
        }
        .menu-item {
            font-size: 17px;            /* 기존 대비 약 65% 크기 */
            font-weight: 500;
            text-align: center;
            padding: 14px 0;
            color: #ffffff;
            transition: all 0.2s;
            cursor: pointer;
        }
        .menu-item:active {
            color: #888888;
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="menu">
        <div class="menu-item" onclick="openLink('https://www.google.com')">CHROME</div>
        <div class="menu-item" onclick="openLink('https://mail.google.com')">MAIL</div>
        <div class="menu-item" onclick="openLink('https://web.telegram.org')">TELEGRAM</div>
        <div class="menu-item" onclick="openLink('https://x.com')">X</div>
        <div class="menu-item" onclick="openLink('https://messages.google.com')">MESSAGES</div>
        <div class="menu-item" onclick="openLink('tel:')">PHONE</div>
        <div class="menu-item" onclick="openLink('#')">EVERYDAY</div>
        <div class="menu-item" onclick="openLink('https://tesla.com')">TESLA</div>
        
        <!-- 여기에 계속 추가하세요 -->
        <!-- <div class="menu-item" onclick="openLink('URL')">앱이름</div> -->
    </div>

    <script>
        function openLink(url) {
            if (url === 'tel:') {
                window.location.href = url;
            } else {
                window.open(url, '_blank');
            }
        }
    </script>
</body>
</html>

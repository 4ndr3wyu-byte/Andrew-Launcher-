<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-touch-fullscreen" content="yes">
    
    <title>Andrew Launcher</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow-y: auto;
            padding: 40px 20px 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .menu {
            display: flex;
            flex-direction: column;
            gap: 4px;           /* 이전보다 절반으로 줄임 */
            width: 100%;
            max-width: 380px;
        }
        .menu-item {
            font-size: 30px;
            font-weight: 500;
            text-align: center;
            padding: 16px 0;
            color: #ffffff;
            transition: all 0.2s;
            cursor: pointer;
        }
        .menu-item:active {
            color: #aaaaaa;
            transform: scale(0.96);
        }
        
        .close-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #2c2c2e;
            color: white;
            font-size: 18px;
            font-weight: 600;
            padding: 16px 80px;
            border-radius: 30px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="menu">      
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#Telegram')">텔레그램</div>                
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#Email')">이메일</div>        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#Calendar')">달력</div>        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#Notes')">노트</div>                        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#Tesla')">테슬라</div>                
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#Phone')">전화</div>        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#Message')">메세지</div>        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#X')">X</div>                
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#밀리의서재')">밀리의서재</div>        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#Podcast')">팟캐스트</div>        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#Photos')">사진</div>                                                
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#계산기')">계산기</div>                
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#KDV')">KDV</div>        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#출발')">출발</div>        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#도착')">도착</div>                                                        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#퇴근')">퇴근</div>                
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#맥도날드')">맥도날드</div>        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#헝그리잭스')">헝그리잭스</div>        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#알리익스프레스')">알리익스프레스</div>                                                                
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#Files')">Files</div>                                        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#ANZ')">ANZ</div>                
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#SmartLife')">SmartLife</div>        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#UKGpro')">UKG Pro</div>        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#MyISS')">MyISS</div>                                                
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#중국어단어')">중국어단어</div>                
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#Setting')">Setting</div>        
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=#Warframe')">Warframe</div>        

    </div>

    <button class="close-btn" onclick="closeLauncher()">Close</button>

    <script>
        function openApp(url) {
            window.location.href = url;
        }

        function closeLauncher() {
            // Tabclose 단축어 실행
            window.location.href = "shortcuts://run-shortcut?name=Tabclose";
        }
    </script>
</body>
</html>

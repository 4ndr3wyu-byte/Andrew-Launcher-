<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA 풀스크린 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-touch-fullscreen" content="yes">
    
    <title>Andrew Launcher</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            padding: 20px 15px;
            touch-action: manipulation;
        }
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 55px;
        }
        .title { 
            font-size: 42px; 
            font-weight: 600; 
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px 12px;
            max-width: 420px;
            margin: 0 auto;
        }
        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .icon {
            width: 72px;
            height: 72px;
            background-color: #1c1c1e;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .app-name { 
            font-size: 12.5px; 
            font-weight: 500; 
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title"> ..</div>
    </div>

    <div class="grid">
        <div class="app" onclick="openLink('https://www.google.com')"><div class="icon">🌐</div><div class="app-name">CHROME</div></div>
        <div class="app" onclick="openLink('https://mail.google.com')"><div class="icon">✉️</div><div class="app-name">MAIL</div></div>
        <div class="app" onclick="openLink('https://web.telegram.org')"><div class="icon">✈️</div><div class="app-name">TELEGRAM</div></div>
        <div class="app" onclick="openLink('https://x.com')"><div class="icon">❌</div><div class="app-name">X</div></div>

        <div class="app" onclick="openLink('https://messages.google.com')"><div class="icon">💬</div><div class="app-name">MESSAGES</div></div>
        <div class="app" onclick="openLink('tel:')"><div class="icon">📞</div><div class="app-name">PHONE</div></div>
        <div class="app" onclick="openLink('#')"><div class="icon">🏠</div><div class="app-name">EVERYDAY</div></div>
        <div class="app" onclick="openLink('https://tesla.com')"><div class="icon">🚗</div><div class="app-name">TESLA</div></div>
    </div>

    <script>
        function openLink(url) {
            if (url === 'tel:') {
                window.location.href = url;
            } else {
                window.open(url, '_blank');
            }
        }
    </script>
</body>
</html>

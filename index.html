<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-touch-fullscreen" content="yes">
    
    <title>Andrew Launcher</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow-y: auto;
            padding: 40px 20px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            max-width: 380px;
        }
        .menu-item {
            font-size: 17px;
            font-weight: 500;
            text-align: center;
            padding: 13px 0;
            color: #ffffff;
            transition: all 0.2s;
            cursor: pointer;
        }
        .menu-item:active {
            color: #888888;
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="menu">
        <div class="menu-item" onclick="openApp('calshow://')">달력</div>
        <div class="menu-item" onclick="openApp('tel:')">폰</div>
        <div class="menu-item" onclick="openApp('sms:')">메세지</div>
        <div class="menu-item" onclick="openApp('telegram://')">텔레그램</div>
        <div class="menu-item" onclick="openApp('tesla://')">테슬라</div>
        <div class="menu-item" onclick="openApp('shortcuts://run-shortcut?name=퇴근')">퇴근</div>
        <div class="menu-item" onclick="openApp('notes://')">노트</div>
        <div class="menu-item" onclick="openApp('https://smartlife.tuya.com')">SmartLife</div>
        <div class="menu-item" onclick="openApp('mcdonalds://')">MyMaccas</div>
        <div class="menu-item" onclick="openApp('https://www.hungryjacks.com.au')">Hungry Jack's</div>
        <div class="menu-item" onclick="openApp('https://ukg.com')">UKG Pro</div>
        <div class="menu-item" onclick="openApp('#')">MyISS</div>
        <div class="menu-item" onclick="openApp('shortcuts://')">단축어</div>
        <div class="menu-item" onclick="openApp('App-Prefs:root')">세팅</div>
        <div class="menu-item" onclick="openApp('files://')">Files</div>
        <div class="menu-item" onclick="openApp('webtoons://')">웹툰</div>
        <div class="menu-item" onclick="openApp('podcasts://')">팟캐스트</div>
        <div class="menu-item" onclick="openApp('calculator://')">계산기</div>
        <div class="menu-item" onclick="openApp('#')">Warframe</div>
    </div>

    <script>
        function openApp(url) {
            // 1차 시도
            window.location.href = url;
            
            // 2차 시도 (일부 앱에서 더 잘 먹힘)
            setTimeout(() => {
                if (document.hidden === false) {
                    window.location.href = url;
                }
            }, 300);
        }
    </script>
</body>
</html>
